name: AeroBeat Quality Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  gut-tests:
    name: Restore testbed and run GUT
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: 🧰 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: 🤖 Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          use-dotnet: false

      - name: 📦 Install GodotEnv
        shell: bash
        run: |
          dotnet tool install --global Chickensoft.GodotEnv
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: 🔗 Restore testbed dependencies
        working-directory: ./.testbed
        run: godotenv addons install

      - name: 🧭 Import testbed project
        run: godot --headless --path .testbed --import

      - name: 🧪 Run GUT tests
        run: |
          godot --headless --path .testbed --script addons/gut/gut_cmdln.gd \
            -gdir=res://tests \
            -ginclude_subdirs \
            -gexit
